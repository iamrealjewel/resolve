name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          
          # 1. Copy standalone contents
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy/
          else
            echo "Standalone directory not found! Check next.config.ts"
            exit 1
          fi
          
          # 2. Copy static and public (required for standalone mode)
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/
          cp -r public/. deploy/public/
          
          # 3. Include prisma (ensure binaries are available for CloudLinux)
          # The prisma output is configured as src/generated/client in schema.prisma
          mkdir -p deploy/src
          cp -r src/generated deploy/src/
          
          # 4. Include .htaccess (required by cPanel NodeJS Selector)
          if [ -f ".htaccess" ]; then
            cp .htaccess deploy/
          fi
          
          # 5. Create ZIPs
          cd deploy && zip -r ../deploy.zip . && cd ..
          # Create source bundle as a backup
          zip -r source_bundle.zip . -x "node_modules/*" ".next/*" "deploy/*" ".git/*" "deploy.zip" "artifacts/*" "source_bundle.zip"
          
          # 6. Move all artifacts to a clean folder for FTP
          mkdir -p artifacts
          cp deploy.zip artifacts/
          cp source_bundle.zip artifacts/
          cp package.json artifacts/
          if [ -f ".htaccess" ]; then
            cp .htaccess artifacts/
          fi
          # Include a dummy file to ensure directory isn't empty
          touch artifacts/.keep

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./artifacts/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/
          dangerous-clean-slate: false
