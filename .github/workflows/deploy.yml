name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          # Ensure sharp for linux-x64 is installed for the standalone build
          npm install --platform=linux --arch=x64 sharp --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          
          # 1. Copy standalone contents
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy/
          else
            echo "Standalone directory not found! Check next.config.ts"
            exit 1
          fi
          
          # 2. Copy static and public (required for standalone mode)
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/
          cp -r public/. deploy/public/
          
          # 3. Include prisma client (Linux/CloudLinux binaries — generated in this Ubuntu runner)
          # These binaries are compatible with CloudLinux (RHEL OpenSSL targets in schema.prisma)
          mkdir -p deploy/src
          cp -r src/generated deploy/src/
          
          # 4. Include .htaccess (required by cPanel NodeJS Selector)
          if [ -f ".htaccess" ]; then
            cp .htaccess deploy/
          fi
          
          # 5. Create prisma_client.zip separately
          # This is a standalone zip of ONLY the generated Prisma client (Linux binaries).
          # Extract this on the server to update the client without regenerating it.
          cd src/generated/client && zip -r ../../../prisma_client.zip . && cd ../../..
          
          # 6. Create full deploy.zip
          cd deploy && zip -r ../deploy.zip . && cd ..
          
          # 7. Move all artifacts to a clean folder for FTP
          mkdir -p artifacts
          cp deploy.zip artifacts/
          cp prisma_client.zip artifacts/
          cp package.json artifacts/
          if [ -f ".htaccess" ]; then
            cp .htaccess artifacts/
          fi
          # Include a dummy file to ensure directory isn't empty
          touch artifacts/.keep


      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./artifacts/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/
          dangerous-clean-slate: false
